<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>课表</title>
<style>
  :root {
    color-scheme: light dark;
    /* Dark (default) — refined deep slate */
    --bg-grad-1: rgba(18, 20, 28, 0.78);
    --bg-grad-2: rgba(28, 30, 42, 0.72);
    --card: rgba(255, 255, 255, 0.04);
    --card-hover: rgba(255, 255, 255, 0.07);
    --text: #f5f6f8;
    --text-soft: #c8ccd4;
    --muted: #7b8190;
    --muted-strong: #9aa0ae;
    --accent: #ff6b4a;
    --accent-2: #ffa07a;
    --accent-glow: rgba(255, 107, 74, 0.25);
    --accent-soft: rgba(255, 107, 74, 0.10);
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --done: rgba(255, 255, 255, 0.22);
    --shadow: 0 30px 80px rgba(0, 0, 0, 0.45), 0 8px 24px rgba(0, 0, 0, 0.25);
    --section-icon-bg: rgba(255, 255, 255, 0.06);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg-grad-1: rgba(255, 255, 255, 0.85);
      --bg-grad-2: rgba(245, 246, 250, 0.78);
      --card: rgba(0, 0, 0, 0.025);
      --card-hover: rgba(0, 0, 0, 0.04);
      --text: #15171c;
      --text-soft: #3a3f4a;
      --muted: #7b8190;
      --muted-strong: #5a606e;
      --accent: #ff5a36;
      --accent-2: #ff8a65;
      --accent-glow: rgba(255, 90, 54, 0.22);
      --accent-soft: rgba(255, 90, 54, 0.08);
      --border: rgba(0, 0, 0, 0.06);
      --border-strong: rgba(0, 0, 0, 0.12);
      --done: rgba(0, 0, 0, 0.28);
      --shadow: 0 30px 80px rgba(20, 20, 30, 0.18), 0 8px 24px rgba(20, 20, 30, 0.08);
      --section-icon-bg: rgba(0, 0, 0, 0.05);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
    color: var(--text);
    background: transparent;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11", "tnum";
  }
  body {
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 32px;
  }

  .panel {
    width: 340px;
    position: relative;
    background:
      linear-gradient(165deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
    backdrop-filter: blur(32px) saturate(180%);
    -webkit-backdrop-filter: blur(32px) saturate(180%);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 22px 22px 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: fadeIn 0.6s ease-out;
  }
  .panel::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 22px;
    padding: 1px;
    background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.02) 40%, transparent);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .brand-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--text-soft);
    text-transform: uppercase;
  }
  .clock {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted-strong);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
  }

  /* ── Now Card ── */
  .now-card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    padding: 16px 18px 14px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .now-card.active {
    background: linear-gradient(135deg, var(--accent-soft), transparent 70%);
    border-color: var(--accent-glow);
  }
  .now-card.active::after {
    content: "";
    position: absolute;
    top: -50%;
    right: -30%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, var(--accent-glow), transparent 60%);
    pointer-events: none;
    animation: glow 4s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  .now-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .now-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted-strong);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 var(--accent-glow); }
    70%  { box-shadow: 0 0 0 8px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .now-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--card-hover);
    color: var(--muted-strong);
    border: 1px solid var(--border);
  }
  .now-card.active .now-badge {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
  }
  .now-name {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }
  .now-card.active .now-name {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .now-meta {
    font-size: 12px;
    color: var(--muted-strong);
    font-variant-numeric: tabular-nums;
    position: relative;
    z-index: 1;
  }
  .now-meta strong {
    color: var(--text-soft);
    font-weight: 600;
  }
  .progress {
    height: 4px;
    background: var(--border);
    border-radius: 999px;
    margin-top: 12px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  .progress > span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 999px;
    transition: width 1s linear;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* ── Sections ── */
  .section {
    margin-top: 14px;
  }
  .section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    padding: 0 4px;
  }
  .section-icon {
    width: 18px;
    height: 18px;
    border-radius: 6px;
    background: var(--section-icon-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  .section-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted-strong);
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.4;
    transition: background 0.3s ease;
    position: relative;
  }
  .row + .row { margin-top: 1px; }
  .row .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border-strong);
    flex-shrink: 0;
    transition: all 0.3s ease;
  }
  .row .name {
    font-weight: 500;
    color: var(--text-soft);
    flex: 1;
  }
  .row .time {
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .row.done .dot {
    background: var(--done);
  }
  .row.done .name,
  .row.done .time {
    color: var(--done);
    text-decoration: line-through;
    text-decoration-thickness: 1px;
  }
  .row.current {
    background: var(--accent-soft);
  }
  .row.current .dot {
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    animation: pulse 2s infinite;
  }
  .row.current .name {
    color: var(--accent);
    font-weight: 700;
  }
  .row.current .time {
    color: var(--accent);
    font-weight: 600;
  }
  .row.next .dot {
    background: var(--accent);
    opacity: 0.6;
  }
  .row.next .name {
    color: var(--text);
  }

  /* ── Footer ── */
  .footer {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
    letter-spacing: 0.2px;
  }
</style>
</head>
<body>
  <div class="panel" id="panel">
    <div class="header">
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-title">今日课表</div>
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </div>

    <div class="now-card" id="now-card">
      <div class="now-head">
        <div class="now-label">
          <span class="pulse" id="pulse"></span>
          <span id="now-label">当前</span>
        </div>
        <div class="now-badge" id="now-badge">—</div>
      </div>
      <div class="now-name" id="now-name">加载中…</div>
      <div class="now-meta" id="now-meta"></div>
      <div class="progress"><span id="progress-bar" style="width:0%"></span></div>
    </div>

    <div id="sections"></div>

    <div class="footer">下课时间以讲师宣布为准 · 22:00 后值日</div>
  </div>

<script>
const SCHEDULE = [
  { title: '上午', icon: '☀', items: [
    { name: '点名 + 早读', start: '08:20', end: '08:30' },
    { name: '第一节课',   start: '08:30', end: '09:30' },
    { name: '第二节课',   start: '09:40', end: '10:30' },
    { name: '第三节课',   start: '10:40', end: '11:30' },
    { name: '第四节课',   start: '11:40', end: '12:30' },
  ]},
  { title: '下午', icon: '◐', items: [
    { name: '点名 + 演讲', start: '14:10', end: '14:30' },
    { name: '第一节课',   start: '14:30', end: '15:20' },
    { name: '第二节课',   start: '15:30', end: '16:20' },
    { name: '第三节课',   start: '16:30', end: '17:20' },
    { name: '第四节课',   start: '17:30', end: '18:30' },
  ]},
  { title: '晚自习', icon: '☾', items: [
    { name: '点名',       start: '19:30', end: '19:30' },
    { name: '第一节课',   start: '19:30', end: '20:20' },
    { name: '第二节课',   start: '20:30', end: '21:20' },
    { name: '第三节课',   start: '21:30', end: '22:00' },
    { name: '值日',       start: '22:00', end: '22:15' },
  ]},
];

function toMin(hm) {
  const [h, m] = hm.split(':').map(Number);
  return h * 60 + m;
}
function fmtClock(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function fmtRemain(mins) {
  if (mins < 1) return '不到 1 分钟';
  if (mins < 60) return `${mins} 分钟`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h} 小时 ${m} 分钟` : `${h} 小时`;
}

function buildSections() {
  const root = document.getElementById('sections');
  root.innerHTML = '';
  SCHEDULE.forEach((sec, si) => {
    const secEl = document.createElement('div');
    secEl.className = 'section';
    secEl.innerHTML = `
      <div class="section-head">
        <div class="section-icon">${sec.icon}</div>
        <div class="section-title">${sec.title}</div>
        <div class="section-line"></div>
      </div>
    `;
    sec.items.forEach((it, ii) => {
      const row = document.createElement('div');
      row.className = 'row';
      row.dataset.idx = `${si}-${ii}`;
      row.innerHTML = `
        <span class="dot"></span>
        <span class="name">${it.name}</span>
        <span class="time">${it.start}–${it.end}</span>
      `;
      secEl.appendChild(row);
    });
    root.appendChild(secEl);
  });
}

function tick() {
  const now = new Date();
  document.getElementById('clock').textContent = fmtClock(now);
  const cur = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;

  const flat = [];
  SCHEDULE.forEach((sec, si) => sec.items.forEach((it, ii) => {
    flat.push({ ...it, si, ii, s: toMin(it.start), e: toMin(it.end) || toMin(it.start) + 1 });
  }));

  let current = null, nextItem = null, nextIdx = -1;
  for (let i = 0; i < flat.length; i++) {
    if (cur >= flat[i].s && cur < flat[i].e) { current = flat[i]; nextIdx = i + 1; break; }
  }
  if (!current) {
    for (let i = 0; i < flat.length; i++) {
      if (flat[i].s > cur) { nextItem = flat[i]; nextIdx = i; break; }
    }
  } else if (nextIdx < flat.length) {
    nextItem = flat[nextIdx];
  }

  document.querySelectorAll('.row').forEach(r => {
    r.classList.remove('current', 'done', 'next');
    const [si, ii] = r.dataset.idx.split('-').map(Number);
    const it = flat.find(x => x.si === si && x.ii === ii);
    if (current && it.si === current.si && it.ii === current.ii) r.classList.add('current');
    else if (cur >= it.e) r.classList.add('done');
    else if (!current && nextItem && it.si === nextItem.si && it.ii === nextItem.ii) r.classList.add('next');
  });

  const card = document.getElementById('now-card');
  const nameEl = document.getElementById('now-name');
  const labelEl = document.getElementById('now-label');
  const metaEl = document.getElementById('now-meta');
  const badge = document.getElementById('now-badge');
  const pulse = document.getElementById('pulse');
  const bar = document.getElementById('progress-bar');
  const day = now.getDay();

  if (day === 0 || day === 6) {
    card.classList.remove('active');
    pulse.style.display = 'none';
    labelEl.textContent = '周末';
    badge.textContent = 'OFF';
    nameEl.textContent = '休息日';
    metaEl.innerHTML = '今日无课程安排';
    bar.style.width = '0%';
  } else if (current) {
    card.classList.add('active');
    pulse.style.display = '';
    labelEl.textContent = '正在进行';
    badge.textContent = 'LIVE';
    nameEl.textContent = current.name;
    const remain = Math.ceil(current.e - cur);
    metaEl.innerHTML = `<strong>${current.start}–${current.end}</strong> · 还有 ${fmtRemain(remain)}`;
    const pct = ((cur - current.s) / (current.e - current.s)) * 100;
    bar.style.width = `${Math.min(100, Math.max(0, pct))}%`;
  } else if (nextItem) {
    card.classList.remove('active');
    pulse.style.display = 'none';
    labelEl.textContent = '下一节';
    badge.textContent = 'NEXT';
    nameEl.textContent = nextItem.name;
    const wait = Math.ceil(nextItem.s - cur);
    metaEl.innerHTML = `<strong>${nextItem.start}</strong> 开始 · ${fmtRemain(wait)} 后`;
    bar.style.width = '0%';
  } else {
    card.classList.remove('active');
    pulse.style.display = 'none';
    labelEl.textContent = '今日';
    badge.textContent = 'DONE';
    nameEl.textContent = '已结束';
    metaEl.innerHTML = '辛苦了，早点休息';
    bar.style.width = '100%';
  }
}

buildSections();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
